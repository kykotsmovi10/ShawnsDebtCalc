<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Calc's</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif}

.sidebar{
  position:fixed;left:0;top:0;bottom:0;
  width:56px;
  background:#1c1a16;
  display:flex;flex-direction:column;
  z-index:100;
  transition:width .25s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.sidebar:hover,.sidebar.pinned{
  width:220px;
}
.sidebar-header{
  padding:16px 14px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  min-height:56px;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;
}
.sidebar-header .logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:rgba(15,31,58,.7);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sidebar-header .logo-text{
  opacity:0;transition:opacity .15s;
}
.sidebar:hover .sidebar-header .logo-text,
.sidebar.pinned .sidebar-header .logo-text{
  opacity:1;
}
.sidebar-header h1{
  font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;line-height:1.3;
}
.sidebar-header p{
  font-size:9px;font-weight:600;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:1.2px;margin-top:3px;
}
.sidebar-nav{
  flex:1;padding:10px 8px;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:4px;
}
.nav-btn{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  border:none;background:transparent;
  cursor:pointer;text-align:left;width:100%;
  transition:all .2s;color:rgba(255,255,255,.55);
  font-family:inherit;font-size:13px;font-weight:500;
  position:relative;white-space:nowrap;
}
.nav-btn .nav-label{
  opacity:0;transition:opacity .15s;
}
.sidebar:hover .nav-btn .nav-label,
.sidebar.pinned .nav-btn .nav-label{
  opacity:1;
}
.nav-btn:hover{
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.85);
}
.nav-btn.active{
  background:rgba(15,31,58,.6);
  color:#fff;font-weight:600;
}
.nav-btn.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:3px;border-radius:0 3px 3px 0;background:#4a6fa5;
}
.nav-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;
}
.nav-btn.active .nav-icon{background:rgba(15,31,58,.7)}
.nav-btn:not(.active) .nav-icon{background:rgba(255,255,255,.06)}

.sidebar-footer{
  padding:14px 12px;border-top:1px solid rgba(255,255,255,.06);
  font-size:9px;color:rgba(255,255,255,.18);text-align:center;
  letter-spacing:.5px;white-space:nowrap;
  opacity:0;transition:opacity .15s;
}
.sidebar:hover .sidebar-footer,
.sidebar.pinned .sidebar-footer{
  opacity:1;
}

.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:42px;height:42px;border-radius:10px;
  background:#1c1a16;border:none;cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:5px;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.hamburger span{
  display:block;width:20px;height:2px;background:#fff;border-radius:2px;
  transition:all .3s;
}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

.main{
  margin-left:56px;height:100%;position:relative;
  background:#f6f4ed;
  transition:margin-left .25s cubic-bezier(.4,0,.2,1);
}
.calc-frame{
  width:100%;height:100%;border:none;display:block;
  position:absolute;top:0;left:0;
  visibility:hidden;pointer-events:none;z-index:0;
}
.calc-frame.active{
  visibility:visible;pointer-events:auto;z-index:1;
}

.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:90;
  backdrop-filter:blur(4px);
}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:flex}
  .main{margin-left:0}
}

@media print{
  .sidebar,.hamburger,.sidebar-overlay{display:none!important}
  .main{margin-left:0!important}
  .calc-frame:not(.active){display:none!important}
}
</style>
</head>
<body>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="logo-text">
      <h1>Mortgage Calc's</h1>
      <p>Client Call Tools</p>
    </div>
  </div>

  <div class="sidebar-nav">
    <button class="nav-btn active" data-frame="frame-debt" onclick="showFrame(this)">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="nav-label">Mortgage Debt<br>Calculator</span>
    </button>

    <button class="nav-btn" data-frame="frame-sbs" onclick="showFrame(this)">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
      </div>
      <span class="nav-label">Mortgage Side<br>by Side</span>
    </button>

    <button class="nav-btn" data-frame="frame-pmt" onclick="showFrame(this)">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </div>
      <span class="nav-label">Payment<br>Comparison</span>
    </button>
  </div>

  <div class="sidebar-footer">
    VA Loan Specialist Tools
  </div>
</nav>

<div class="main" id="main">
  <iframe id="frame-debt" class="calc-frame active" src="debt-calc.html" title="Mortgage Debt Calculator"></iframe>
  <iframe id="frame-sbs" class="calc-frame" src="side-by-side.html" title="Mortgage Side by Side"></iframe>
  <iframe id="frame-pmt" class="calc-frame" src="payment-comparison.html" title="Payment Comparison"></iframe>
</div>

<script>
function showFrame(btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const id=btn.getAttribute('data-frame');
  document.querySelectorAll('.calc-frame').forEach(f=>{
    f.classList.toggle('active',f.id===id);
  });
  if(window.innerWidth<=768) toggleSidebar();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}
</script>
</body>
</html>
