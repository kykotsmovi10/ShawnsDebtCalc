<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawn's Mortgage Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif}

/* ─── SIDEBAR ─── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:220px;
  background:#1c1a16;
  display:flex;flex-direction:column;
  z-index:100;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:24px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-header h1{
  font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.3;
}
.sidebar-header p{
  font-size:10px;font-weight:600;color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:1.2px;margin-top:6px;
}
.sidebar-nav{
  flex:1;padding:12px 10px;overflow-y:auto;
  display:flex;flex-direction:column;gap:4px;
}
.nav-btn{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;
  border:none;background:transparent;
  cursor:pointer;text-align:left;width:100%;
  transition:all .2s;color:rgba(255,255,255,.55);
  font-family:inherit;font-size:13px;font-weight:500;
  position:relative;
}
.nav-btn:hover{
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.85);
}
.nav-btn.active{
  background:rgba(38,90,58,.35);
  color:#fff;font-weight:600;
}
.nav-btn.active::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;
  width:3px;border-radius:0 3px 3px 0;background:#3a7d54;
}
.nav-icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;
}
.nav-btn.active .nav-icon{background:rgba(38,90,58,.5)}
.nav-btn:not(.active) .nav-icon{background:rgba(255,255,255,.06)}

.sidebar-footer{
  padding:16px 20px;border-top:1px solid rgba(255,255,255,.06);
  font-size:10px;color:rgba(255,255,255,.2);text-align:center;
  letter-spacing:.5px;
}

/* ─── HAMBURGER (mobile) ─── */
.hamburger{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  width:42px;height:42px;border-radius:10px;
  background:#1c1a16;border:none;cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:5px;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.hamburger span{
  display:block;width:20px;height:2px;background:#fff;border-radius:2px;
  transition:all .3s;
}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ─── MAIN CONTENT ─── */
.main{
  margin-left:220px;height:100%;
  background:#f6f4ed;
}
.main iframe{
  width:100%;height:100%;border:none;display:block;
}

/* ─── MOBILE OVERLAY ─── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:90;
  backdrop-filter:blur(4px);
}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:flex}
  .main{margin-left:0}
}

@media print{
  .sidebar,.hamburger,.sidebar-overlay{display:none!important}
  .main{margin-left:0!important}
}
</style>
</head>
<body>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Shawn's Mortgage<br>Toolkit</h1>
    <p>Client Call Tools</p>
  </div>

  <div class="sidebar-nav" id="nav">
    <button class="nav-btn active" data-page="debt-calc.html" onclick="loadPage(this)">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span>Mortgage Debt<br>Calculator</span>
    </button>

    <button class="nav-btn" data-page="side-by-side.html" onclick="loadPage(this)">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
      </div>
      <span>Mortgage Side<br>by Side</span>
    </button>
  </div>

  <div class="sidebar-footer">
    VA Loan Specialist Tools
  </div>
</nav>

<!-- Main content area -->
<div class="main" id="main">
  <iframe id="content-frame" src="debt-calc.html" title="Calculator"></iframe>
</div>

<script>
function loadPage(btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content-frame').src=btn.getAttribute('data-page');
  if(window.innerWidth<=768) toggleSidebar();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}
</script>
</body>
</html>
