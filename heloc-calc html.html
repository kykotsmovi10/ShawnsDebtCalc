<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELOC Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--navy:#0f1f3a;--navy-light:#1a3158;--navy-glow:#edf1f7;--sienna:#9c4a2d;--gold:#c4982a;--gold-light:#d4ad4a;--gold-bg:#faf6ed;--parchment:#f6f4ed;--parchment-deep:#edeadf;--ink:#1c1a16;--ink-soft:#4a473e;--ink-muted:#7a7770;--ink-faint:#a8a49a;--border:#d8d4c8;--border-light:#e8e5da;--card:#fff;--radius:10px;--shadow-sm:0 1px 3px rgba(0,0,0,.05)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--parchment);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease-out both}
@media print{body{background:#fff;font-size:10px}.no-print{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const fmt=v=>{if(v==null||isNaN(v))return"$0.00";return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v)};

function Card({children,title,subtitle,accent,delay}){return(<div className="card animate-in" style={{background:'var(--card)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'24px 28px',boxShadow:'var(--shadow-sm)',animationDelay:(delay||0)+'ms'}}>{title&&<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:subtitle?4:18}}>{accent&&<div style={{width:4,height:24,borderRadius:2,background:accent}}/>}<h2 style={{fontSize:18,fontWeight:700,letterSpacing:-.4}}>{title}</h2></div>}{subtitle&&<p style={{fontSize:12.5,color:'var(--ink-muted)',marginBottom:18,marginLeft:accent?14:0}}>{subtitle}</p>}{children}</div>)}

function Inp({label,value,onChange,prefix,suffix,step}){return(<div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:110}}><label style={{fontSize:10.5,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1}}>{label}</label><div style={{display:'flex',alignItems:'center',gap:4,background:'var(--parchment)',border:'1.5px solid var(--border)',borderRadius:8,padding:'7px 12px',transition:'border-color .2s'}} onFocus={e=>e.currentTarget.style.borderColor='#c4982a'} onBlur={e=>e.currentTarget.style.borderColor='var(--border)'}>{prefix&&<span style={{color:'var(--ink-faint)',fontSize:14,fontWeight:600,userSelect:'none'}}>{prefix}</span>}<input type="number" value={value} step={step||"any"} onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))} style={{border:'none',outline:'none',background:'transparent',fontSize:15,fontWeight:600,color:'var(--ink)',width:'100%',fontFamily:"'DM Sans',sans-serif"}}/>{suffix&&<span style={{color:'var(--ink-faint)',fontSize:13,userSelect:'none'}}>{suffix}</span>}</div></div>)}

function Stat({label,value,sub,color,large}){return(<div style={{flex:1,minWidth:large?160:130,background:'var(--parchment)',borderRadius:10,padding:large?'18px 20px':'14px 16px',border:'1px solid var(--border-light)'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.9,marginBottom:5}}>{label}</div><div style={{fontSize:large?28:21,fontWeight:700,color:color||'var(--ink)',letterSpacing:-.6,lineHeight:1.15}}>{value}</div>{sub&&<div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:4,lineHeight:1.4}}>{sub}</div>}</div>)}

function App(){
  const[creditLimit,setCreditLimit]=useState(100000);
  const[drawAmount,setDrawAmount]=useState(50000);
  const[rate,setRate]=useState(8.5);
  const[drawYrs,setDrawYrs]=useState(10);
  const[repayYrs,setRepayYrs]=useState(20);
  const[extraPmt,setExtraPmt]=useState(0);

  // Rate scenarios
  const[rateUp1,setRateUp1]=useState(true);
  const[rateUp2,setRateUp2]=useState(true);

  const R=useMemo(()=>{
    const P=drawAmount||0,ar=(rate||0)/100,r=ar/12;
    const drawMo=(drawYrs||10)*12,repayMo=(repayYrs||20)*12;

    // Draw period: interest-only
    const ioPayment=P*r;

    // Repayment period: P&I
    let piPayment=0;
    if(P>0&&ar>0&&repayMo>0){
      piPayment=(P*r*Math.pow(1+r,repayMo))/(Math.pow(1+r,repayMo)-1);
    }else if(P>0&&repayMo>0){
      piPayment=P/repayMo;
    }

    // Total interest draw period
    const drawInterest=ioPayment*drawMo;

    // Amortize repayment period
    let bal=P,repayInterest=0,repayMonths=0;
    const extra=extraPmt||0;
    for(let m=1;m<=repayMo&&bal>0.005;m++){
      const ip=bal*(ar/12);
      let pp=piPayment-ip+extra;
      if(pp>bal)pp=bal;
      bal=Math.max(0,bal-pp);
      repayInterest+=ip;
      repayMonths=m;
    }

    const totalInterest=drawInterest+repayInterest;
    const totalCost=P+totalInterest;

    // Standard repay (no extra) for comparison
    let stdBal=P,stdInt=0,stdMo=0;
    for(let m=1;m<=repayMo&&stdBal>0.005;m++){
      const ip=stdBal*(ar/12);
      let pp=piPayment-ip;
      if(pp>stdBal)pp=stdBal;
      stdBal=Math.max(0,stdBal-pp);
      stdInt+=ip;
      stdMo=m;
    }
    const intSaved=(drawInterest+stdInt)-totalInterest;
    const moSaved=stdMo-repayMonths;

    // Rate scenarios
    const calcScenario=(scenarioRate)=>{
      const sr=scenarioRate/100/12;
      const sIO=P*sr;
      let sPIpmt=0;
      if(P>0&&sr>0&&repayMo>0){
        sPIpmt=(P*sr*Math.pow(1+sr,repayMo))/(Math.pow(1+sr,repayMo)-1);
      }
      const sDI=sIO*drawMo;
      let sBal=P,sRI=0;
      for(let m=1;m<=repayMo&&sBal>0.005;m++){
        const ip=sBal*sr;
        let pp=sPIpmt-ip;
        if(pp>sBal)pp=sBal;
        sBal=Math.max(0,sBal-pp);
        sRI+=ip;
      }
      return{ioPayment:sIO,piPayment:sPIpmt,totalInterest:sDI+sRI};
    };

    const s1=rateUp1?calcScenario(rate+1):null;
    const s2=rateUp2?calcScenario(rate+2):null;

    return{ioPayment,piPayment,drawInterest,repayInterest,totalInterest,totalCost,repayMonths,intSaved,moSaved,drawMo,repayMo:repayMo,s1,s2,extra};
  },[drawAmount,rate,drawYrs,repayYrs,extraPmt,rateUp1,rateUp2]);

  const epy=Math.floor(R.repayMonths/12),epm=R.repayMonths%12;
  const ys=Math.floor(R.moSaved/12),ms=R.moSaved%12;

  return(<div style={{maxWidth:940,margin:'0 auto',padding:'24px 16px 72px'}}>
    <header className="animate-in" style={{textAlign:'center',marginBottom:32}}><h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:32,fontWeight:800,letterSpacing:-.8,lineHeight:1.1,color:'var(--ink)'}}>HELOC<br/><span style={{color:'var(--navy)',fontSize:26}}>Calculator</span></h1></header>

    <div style={{display:'flex',flexDirection:'column',gap:20}}>

      <Card title="HELOC Details" accent="var(--navy)" delay={30}>
        <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
          <Inp label="Credit Limit" value={creditLimit} onChange={setCreditLimit} prefix="$"/>
          <Inp label="Draw Amount" value={drawAmount} onChange={setDrawAmount} prefix="$"/>
          <Inp label="Interest Rate (APR)" value={rate} onChange={setRate} suffix="%" step="0.125"/>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:12,marginTop:14}}>
          <Inp label="Draw Period" value={drawYrs} onChange={setDrawYrs} suffix="yrs"/>
          <Inp label="Repayment Period" value={repayYrs} onChange={setRepayYrs} suffix="yrs"/>
          <Inp label="Extra Payment" value={extraPmt} onChange={setExtraPmt} prefix="$"/>
        </div>
        {drawAmount>creditLimit&&<div style={{marginTop:14,padding:'10px 16px',background:'#fdf0ec',borderRadius:8,border:'1.5px solid rgba(156,74,45,.25)',fontSize:13,fontWeight:600,color:'var(--sienna)'}}>Draw amount exceeds credit limit</div>}
      </Card>

      <Card title="Payment Summary" accent="var(--gold)" delay={80}>
        <div style={{display:'flex',flexWrap:'wrap',gap:14,marginBottom:20}}>
          <div style={{flex:'1 1 280px',background:'var(--navy-glow)',borderRadius:12,padding:'20px 24px',border:'1px solid #c8d0de'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Draw Period — Interest Only</div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #dde2ea'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Monthly Payment</span><span style={{fontSize:18,fontWeight:700,color:'var(--navy)'}}>{fmt(R.ioPayment)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #dde2ea'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Duration</span><span style={{fontSize:13,fontWeight:600}}>{drawYrs} years ({R.drawMo} months)</span></div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Total Interest (Draw Period)</span><span style={{fontSize:13,fontWeight:700,color:'var(--sienna)'}}>{fmt(R.drawInterest)}</span></div>
          </div>

          <div style={{flex:'1 1 280px',background:'var(--gold-bg)',borderRadius:12,padding:'20px 24px',border:'1px solid #e0d4a8'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Repayment Period — Principal & Interest</div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #ece4cc'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Monthly Payment (P&I)</span><span style={{fontSize:18,fontWeight:700,color:'var(--navy)'}}>{fmt(R.piPayment)}</span></div>
            {R.extra>0&&<div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #ece4cc'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>+ Extra Payment</span><span style={{fontSize:13,fontWeight:700,color:'var(--gold)'}}>{fmt(R.extra)}</span></div>}
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #ece4cc'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Payoff Time</span><span style={{fontSize:13,fontWeight:600}}>{epy}yr {epm}mo</span></div>
            <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0'}}><span style={{fontSize:13,color:'var(--ink-muted)'}}>Total Interest (Repayment)</span><span style={{fontSize:13,fontWeight:700,color:'var(--sienna)'}}>{fmt(R.repayInterest)}</span></div>
          </div>
        </div>

        <div style={{padding:'20px 24px',background:'var(--navy)',borderRadius:12}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:20,justifyContent:'center'}}>
            <div style={{textAlign:'center',minWidth:140}}>
              <div style={{fontSize:9,fontWeight:600,color:'var(--gold-light)',textTransform:'uppercase',letterSpacing:1.2}}>Total Interest Paid</div>
              <div style={{fontSize:28,fontWeight:700,color:'#fff',marginTop:4}}>{fmt(R.totalInterest)}</div>
            </div>
            <div style={{textAlign:'center',minWidth:140}}>
              <div style={{fontSize:9,fontWeight:600,color:'var(--gold-light)',textTransform:'uppercase',letterSpacing:1.2}}>Total Cost of HELOC</div>
              <div style={{fontSize:28,fontWeight:700,color:'#fff',marginTop:4}}>{fmt(R.totalCost)}</div>
            </div>
            {R.extra>0&&<div style={{textAlign:'center',minWidth:140}}>
              <div style={{fontSize:9,fontWeight:600,color:'var(--gold-light)',textTransform:'uppercase',letterSpacing:1.2}}>Interest Saved</div>
              <div style={{fontSize:28,fontWeight:700,color:'var(--gold-light)',marginTop:4}}>{fmt(R.intSaved)}</div>
            </div>}
            {R.moSaved>0&&<div style={{textAlign:'center',minWidth:140}}>
              <div style={{fontSize:9,fontWeight:600,color:'var(--gold-light)',textTransform:'uppercase',letterSpacing:1.2}}>Months Saved</div>
              <div style={{fontSize:28,fontWeight:700,color:'var(--gold-light)',marginTop:4}}>{ys>0?`${ys}yr `:''}{ms}mo</div>
            </div>}
          </div>
        </div>
      </Card>

      <Card title="Rate Increase Scenarios" subtitle="See how your payments change if the variable rate goes up." accent="var(--sienna)" delay={120}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{borderBottom:'2px solid var(--border)'}}>
              <th style={{padding:'10px 14px',textAlign:'left',fontWeight:700,fontSize:11,color:'var(--ink-muted)',textTransform:'uppercase'}}></th>
              <th style={{padding:'10px 14px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--navy)',textTransform:'uppercase'}}>Current ({rate}%)</th>
              {R.s1&&<th style={{padding:'10px 14px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--gold)',textTransform:'uppercase'}}>+1% ({(rate+1).toFixed(3)}%)</th>}
              {R.s2&&<th style={{padding:'10px 14px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--sienna)',textTransform:'uppercase'}}>+2% ({(rate+2).toFixed(3)}%)</th>}
            </tr></thead>
            <tbody>
              <tr style={{borderBottom:'1px solid var(--border-light)',background:'var(--parchment)'}}>
                <td style={{padding:'10px 14px',fontWeight:600,color:'var(--ink-soft)'}}>Interest-Only Payment</td>
                <td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--navy)'}}>{fmt(R.ioPayment)}</td>
                {R.s1&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--gold)'}}>{fmt(R.s1.ioPayment)}</td>}
                {R.s2&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--sienna)'}}>{fmt(R.s2.ioPayment)}</td>}
              </tr>
              <tr style={{borderBottom:'1px solid var(--border-light)'}}>
                <td style={{padding:'10px 14px',fontWeight:600,color:'var(--ink-soft)'}}>P&I Payment</td>
                <td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--navy)'}}>{fmt(R.piPayment)}</td>
                {R.s1&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--gold)'}}>{fmt(R.s1.piPayment)}</td>}
                {R.s2&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,color:'var(--sienna)'}}>{fmt(R.s2.piPayment)}</td>}
              </tr>
              <tr style={{borderBottom:'1px solid var(--border-light)',background:'var(--parchment)'}}>
                <td style={{padding:'10px 14px',fontWeight:600,color:'var(--ink-soft)'}}>Total Interest</td>
                <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--navy)'}}>{fmt(R.totalInterest)}</td>
                {R.s1&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--gold)'}}>{fmt(R.s1.totalInterest)}</td>}
                {R.s2&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--sienna)'}}>{fmt(R.s2.totalInterest)}</td>}
              </tr>
              <tr>
                <td style={{padding:'10px 14px',fontWeight:600,color:'var(--ink-soft)'}}>IO → P&I Jump</td>
                <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--navy)'}}>{fmt(R.piPayment-R.ioPayment)}</td>
                {R.s1&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--gold)'}}>{fmt(R.s1.piPayment-R.s1.ioPayment)}</td>}
                {R.s2&&<td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'var(--sienna)'}}>{fmt(R.s2.piPayment-R.s2.ioPayment)}</td>}
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{marginTop:14,padding:'12px 16px',background:'var(--parchment)',borderRadius:8,border:'1px solid var(--border-light)',fontSize:12.5,color:'var(--ink-muted)',lineHeight:1.6}}>
          <strong style={{color:'var(--ink)'}}>IO → P&I Jump</strong> shows how much more per month when the draw period ends and full principal & interest payments begin. This is the number that catches clients off guard.
        </div>
      </Card>

      <div style={{textAlign:'center',fontSize:11.5,color:'var(--ink-faint)',marginTop:12,lineHeight:1.7}}>This calculator is for illustrative purposes only and does not constitute a loan commitment or financial advice.<br/>Actual HELOC terms, rates, and payments may vary. Please consult your loan officer.</div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
